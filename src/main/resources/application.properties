spring.application.name=semi-mite-examples
mite.cache-dir=.mite-cache
mite.scripts-dir=cppScripts
mite.alignment-bytes=32


mite.compiler-flags=-Ofast -march=native -mtune=native -flto=auto -funroll-loops -fomit-frame-pointer -ffast-math -funsafe-math-optimizations -fno-math-errno -fno-trapping-math -freciprocal-math -fpeel-loops -funswitch-loops -frename-registers


logging.level.org.example.parser=TRACE
logging.level.org.example.scanner=DEBUG
logging.level.org.example.compiler=DEBUG